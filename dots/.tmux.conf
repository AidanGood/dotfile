
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g default-terminal "screen-256color"  # 256 colour support
set -ga terminal-overrides ",*256col*:Tc"  # true colour passthrough

set -g mouse on                 # mouse on by default (toggle with prefix+m)
set -g history-limit 50000      # large scrollback buffer
set -g display-time 1500        # status messages visible for 1.5s
set -g focus-events on          # pass focus events to applications (e.g. vim)
set -sg escape-time 10          # reduce escape key delay (important for vim)

# System clipboard integration (disabled): uncomment to have tmux yanks
# flow to the OS clipboard via OSC 52. Left off so that only Shift+drag
# (terminal-native selection) reaches the OS clipboard; regular tmux
# drags and copy-mode yanks stay in tmux paste buffers only.
# set -g set-clipboard on
# set-hook -g pane-set-clipboard refresh-client

# Windows and panes start at 0 (tmux default)
set -g renumber-windows on      # reorder window numbers when one is closed

# Split panes with \ and - (unshifted, keep current path)
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"

# New window opens in the same directory
bind c new-window -c "#{pane_current_path}"

# Resize panes with arrow keys, repeatable via prefix
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# Quick 4-pane layout: top full-width + bottom 3 panes side by side
bind o new-window \; split-window \; split-window -h \; select-pane -U \; split-window -h

# Toggle mouse mode (handy for terminal-native text selection)
bind m set -F -g mouse "#{?mouse,0,1}" \; display 'mouse mode #{?mouse,on,off}'

# These intercept the key before the running program sees it — fast but
# permanent. Known conflicts: Ctrl+Left/Right collides with readline
# word-motion; Shift+Arrow collides with editors that use it for selection.
bind-key -n C-Left         previous-window
bind-key -n C-Right        next-window
bind-key -n S-Left         select-pane -L
bind-key -n S-Right        select-pane -R
bind-key -n S-Up           select-pane -U
bind-key -n S-Down         select-pane -D
bind-key -n C-S-Left       swap-window -t -1 \; previous-window
bind-key -n C-S-Right      swap-window -t +1 \; next-window

setw -g mode-keys vi

bind Enter copy-mode            # Enter to enter copy mode

bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

set -g status-position bottom
set -g status-interval 5        # refresh every 5 seconds

# Colours (works in 256-colour and true-colour terminals)
set -g status-style                 "bg=#1e1e2e,fg=#cdd6f4"
set -g window-status-style          "bg=#1e1e2e,fg=#6c7086"
set -g window-status-current-style  "bg=#313244,fg=#cdd6f4,bold"
set -g pane-border-style            "fg=#313244"
set -g pane-active-border-style     "fg=#89b4fa"
set -g message-style                "bg=#313244,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left " #[bold]#S#[nobold]  "

# Right: date and time
set -g status-right-length 50
set -g status-right "%a %d %b  %H:%M "

# Window list format
setw -g window-status-format         " #I #W "
setw -g window-status-current-format " #I #W "
